name: Verify Presentation Sandbox Action

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  verify:
    name: Build and Smoke Presentation Sandbox Action
    runs-on: ubuntu-latest
    env:
      BROWSER_RUNTIME_IMAGE: ${{ vars.XPERT_SANDBOX_BROWSER_IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install plugin dependencies
        run: pnpm -C xpertai install --frozen-lockfile

      - name: Build plugin and verify Action Bundle
        run: |
          pnpm --dir xpertai/apps/presentation-studio build
          pnpm --dir xpertai/apps/presentation-studio verify:sandbox-action

      - name: Require immutable Browser Runtime
        shell: bash
        run: |
          if [[ ! "$BROWSER_RUNTIME_IMAGE" =~ @sha256:[a-f0-9]{64}$ ]]; then
            echo "Set XPERT_SANDBOX_BROWSER_IMAGE to an immutable Browser Runtime digest." >&2
            exit 1
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke PDF and PPTX with Browser Runtime
        run: node xpertai/apps/presentation-studio/scripts/smoke-sandbox-action.mjs --image "$BROWSER_RUNTIME_IMAGE"

      - name: Upload Action Bundle manifest
        uses: actions/upload-artifact@v4
        with:
          name: presentation-sandbox-action
          path: xpertai/apps/presentation-studio/dist/sandbox-actions/presentation-export/action.json
