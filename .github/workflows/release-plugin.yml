name: Release Plugins

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: "Workspace to release"
        required: true
        default: xpertai
        type: choice
        options:
          - xpertai
          - community
          - all
  push:
    branches:
      - main
    paths:
      - "xpertai/**"
      - "community/**"
      - ".github/workflows/release-plugin.yml"

concurrency:
  group: release-plugins
  cancel-in-progress: false

permissions:
  contents: write
  packages: read
  pull-requests: write
  id-token: write

jobs:
  detect:
    name: Detect Changed Workspaces
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      xpertai: ${{ steps.filter.outputs.xpertai }}
      community: ${{ steps.filter.outputs.community }}
      presentation_action: ${{ steps.filter.outputs.presentation_action }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            xpertai:
              - "xpertai/**"
            community:
              - "community/**"
            presentation_action:
              - "xpertai/apps/presentation-studio/**"
  presentation-action:
    name: Verify Presentation Sandbox Action
    needs: detect
    if: >-
      github.ref == 'refs/heads/main' &&
      (needs.detect.outputs.presentation_action == 'true' ||
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.workspace == 'xpertai' || github.event.inputs.workspace == 'all')))
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/presentation-sandbox-action.yml

  release:
    name: Version Or Publish (${{ matrix.workspace }})
    needs:
      - detect
      - presentation-action
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs['presentation-action'].result == 'success' || needs['presentation-action'].result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: xpertai
            pnpm_version: 11.7.0
            install_command: pnpm -C xpertai install --frozen-lockfile
          - workspace: community
            pnpm_version: 8.15.8
            install_command: pnpm -C community install --no-frozen-lockfile

    steps:
      - name: Decide whether to run this workspace
        id: decide
        run: |
          run_workspace="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            selected="${{ github.event.inputs.workspace }}"
            if [ "$selected" = "all" ] || [ "$selected" = "${{ matrix.workspace }}" ]; then
              run_workspace="true"
            fi
          else
            if [ "${{ matrix.workspace }}" = "xpertai" ] && [ "${{ needs.detect.outputs.xpertai }}" = "true" ]; then
              run_workspace="true"
            fi
            if [ "${{ matrix.workspace }}" = "community" ] && [ "${{ needs.detect.outputs.community }}" = "true" ]; then
              run_workspace="true"
            fi
          fi
          echo "run=$run_workspace" >> "$GITHUB_OUTPUT"

      - name: Skip workspace
        if: steps.decide.outputs.run != 'true'
        run: echo "No matching changes or workspace selection for ${{ matrix.workspace }}. Skipping."

      - name: Checkout
        if: steps.decide.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.decide.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Setup pnpm
        if: steps.decide.outputs.run == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ matrix.pnpm_version }}

      - name: Upgrade npm for trusted publishing
        if: steps.decide.outputs.run == 'true'
        run: npm i -g npm@^11.5.1

      - name: Install dependencies
        if: steps.decide.outputs.run == 'true'
        run: ${{ matrix.install_command }}

      - name: Ensure workspace npmrc exists
        if: steps.decide.outputs.run == 'true'
        run: |
          if [ ! -f "${{ matrix.workspace }}/.npmrc" ]; then
            touch "${{ matrix.workspace }}/.npmrc"
          fi

      - name: Point root changeset to workspace changeset
        if: steps.decide.outputs.run == 'true'
        run: |
          rm -rf .changeset
          ln -s "${{ matrix.workspace }}/.changeset" .changeset

      - name: Detect release mode
        if: steps.decide.outputs.run == 'true'
        id: release_mode
        shell: bash
        run: |
          if find "${{ matrix.workspace }}/.changeset" -maxdepth 1 -type f -name "*.md" ! -name "README.md" | grep -q .; then
            echo "mode=version" >> "$GITHUB_OUTPUT"
          else
            echo "mode=publish" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release PR
        if: steps.decide.outputs.run == 'true' && steps.release_mode.outputs.mode == 'version'
        id: changesets
        uses: changesets/action@v1
        with:
          createGithubReleases: false
          branch: main
          commit: "chore(release): version ${{ matrix.workspace }} packages"
          title: "chore(release): version ${{ matrix.workspace }} packages"
          version: pnpm -C ${{ matrix.workspace }} exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish packages
        if: steps.decide.outputs.run == 'true' && steps.release_mode.outputs.mode == 'publish'
        shell: bash
        run: |
          before_tags="$(mktemp)"
          after_tags="$(mktemp)"
          new_tags="$(mktemp)"
          git tag | sort > "$before_tags"

          pnpm -C ${{ matrix.workspace }} run release:publish

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            changed_package_files="$(git diff --name-only --diff-filter=ACMRT HEAD^ HEAD -- "${{ matrix.workspace }}" | grep '/package.json$' || true)"
            if [ -n "$changed_package_files" ]; then
              {
                while IFS= read -r package_file; do
                  node -e 'const fs = require("node:fs"); const packageFile = process.argv[1]; const pkg = JSON.parse(fs.readFileSync(packageFile, "utf8")); if (pkg.private !== true && pkg.name && pkg.version) console.log(`${pkg.name}@${pkg.version}`);' "$package_file"
                done <<< "$changed_package_files"
              } | sort -u | while IFS= read -r tag; do
                if [ -n "$tag" ] && ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
                  git tag "$tag"
                fi
              done
            fi
          fi

          git tag | sort > "$after_tags"
          comm -13 "$before_tags" "$after_tags" > "$new_tags"
          if [ -s "$new_tags" ]; then
            while IFS= read -r tag; do
              git push origin "refs/tags/$tag"
            done < "$new_tags"
          else
            echo "No new git tags to push."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/${{ matrix.workspace }}/.npmrc
          NPM_CONFIG_PROVENANCE: "true"
