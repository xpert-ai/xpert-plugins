name: Release Plugins

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "xpertai/**"
      - ".github/workflows/release-plugin.yml"

concurrency:
  group: release-plugins
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version Or Publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: xpertai/pnpm-lock.yaml

      - name: Upgrade npm for trusted publishing
        run: npm i -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm -C xpertai install --frozen-lockfile

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          cwd: xpertai
          branch: main
          commit: "chore(release): version plugins"
          title: "chore(release): version plugins"
          version: pnpm dlx @changesets/cli version
          publish: pnpm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/xpertai/.npmrc
          NPM_CONFIG_PROVENANCE: "true"
