team:
  name: wechat-admin-assistant
  type: agent
  title: 微信管理员
  description: 管理组织内 wx2.0 微信集成、账号、会话、消息日志和回调配置的 Agent
  avatar:
    emoji:
      id: toolbox
    background: rgb(220, 252, 231)
  options:
    templateKey: wechat-admin-assistant
    dataXpert:
      managedBy: data-xpert
      templateKey: wechat-admin-assistant
      assistantKind: wechat-admin-assistant
      businessDomain: wechat
      wechatRole: admin
      requiredPlugin: '@xpert-ai/plugin-community-wechat'
      requiredPlugins:
        - '@xpert-ai/plugin-community-wechat'
      requiredCapabilities:
        - wechat_bridge
        - wechat-runtime
        - wechat-workbench
  agentConfig:
    recursionLimit: 10000
  features:
    sandbox:
      enabled: false
  version: "1"
  agent:
    key: Agent_WechatAdmin
  copilotModel:
    referencedId: null
    modelType: llm
    model: qwen3.6-plus
    options:
      context_size: 1000000
      temperature: 0.2
      maxRetries: 4
      max_tokens: 4096
      top_p: 0.9
  knowledgebases: []
  toolsets: []
  tags: []
nodes:
  - type: agent
    key: Agent_WechatAdmin
    position:
      x: 820
      y: 20
    entity:
      key: Agent_WechatAdmin
      name: wechat-admin-assistant
      title: 微信管理员
      description: 管理组织内 wx2.0 微信集成、账号、会话、消息日志和回调配置的 Agent
      avatar:
        emoji:
          id: toolbox
        background: rgb(220, 252, 231)
      prompt: >
        You are the WeChat administrator assistant for this organization.

        Your job is to help administrators configure and operate wx2.0 WeChat integrations:
        review organization-wide integration status, callback URLs, account callback health, conversation
        bindings, message logs, dispatch errors, and outbound reply failures. Use the WeChat
        runtime tools when answering operational questions.

        This assistant is not connected to inbound WeChat messages and must not act like an end-user
        chat responder. Do not configure a WeChat trigger in this administrator assistant.

        When an operation can affect a specific wx2.0 integration or account, ask for or use an explicit
        integrationId and uuid before taking action. Never guess an integration from a similar name when
        multiple integrations exist.

        Do not reveal API tokens, callback secrets, hidden routing details, queue identifiers, or system
        configuration that is not needed by the administrator. Callback URLs may be shown only as setup
        instructions for administrators.

        Prefer Chinese for Chinese administrators; otherwise mirror the user's language. Keep answers concise
        and include concrete next steps when diagnosing failures.
      collaboratorNames: []
      toolsetIds: []
      knowledgebaseIds: []
    hash: wechat-admin-agent-v1
  - type: workflow
    key: Middleware_WechatRuntime
    position:
      x: 1140
      y: 280
    entity:
      type: middleware
      key: Middleware_WechatRuntime
      title: WeChat Runtime Tools
      provider: WechatRuntimeMiddleware
      required: true
      options:
        toolMode: admin
    hash: wechat-admin-middleware-v1
connections:
  - type: workflow
    key: Agent_WechatAdmin/Middleware_WechatRuntime
    from: Agent_WechatAdmin
    to: Middleware_WechatRuntime
