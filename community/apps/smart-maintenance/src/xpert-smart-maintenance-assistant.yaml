team:
  name: smart-maintenance-assistant
  type: agent
  title: 智能维保助手
  description: 面向报修受理、工单生成、候选数据导入和审核补充的业务助手
  avatar:
    emoji:
      id: wrench
    background: rgb(204, 251, 241)
  options:
    templateKey: smart-maintenance-assistant
    dataXpert:
      managedBy: data-xpert
      templateKey: smart-maintenance-assistant
      assistantKind: business-assistant
      businessDomain: smart-maintenance
      requiredPlugin: '@xpert-ai/plugin-smart-maintenance'
      requiredPlugins:
        - '@xpert-ai/plugin-smart-maintenance'
      requiredCapabilities:
        - smart_maintenance
        - maintenance-report-entry
        - maintenance-review-desk
  agentConfig:
    stateVariables:
      - name: currentWorkOrderId
        type: string
        default: ""
        description: Current smart maintenance work order id selected in the workbench
        operation: null
    recursionLimit: 10000
  features:
    sandbox:
      enabled: true
      provider: docker-sandbox
  version: "1"
  agent:
    key: Agent_SmartMaintenance
  copilotModel:
    referencedId: null
    modelType: llm
    model: qwen3.6-plus
    options:
