team:
  name: sales-ontology-assistant
  type: agent
  title: Sales Ontology 决策助手
  description: 面向销售对象感知、推理、建议和动作治理的业务助手
  avatar:
    emoji:
      id: chart_with_upwards_trend
    background: rgb(213, 245, 246)
  options:
    templateKey: sales-ontology-business-assistant
    dataXpert:
      managedBy: data-xpert
      templateKey: sales-ontology-business-assistant
      assistantKind: business-assistant
      businessDomain: sales-ontology
      requiredPlugin: '@xpert-ai/plugin-sales-ontology'
      requiredCapabilities:
        - sales-ontology-core
        - sales-ontology-decision-workbench
  agentConfig:
    stateVariables:
      - name: resourceId
        type: string
        default: sales-ontology
        description: data-xpert business ontology resource id
        operation: null
    recursionLimit: 10000
  features:
    sandbox:
      enabled: true
      provider: docker-sandbox
  version: "1"
  agent:
    key: Agent_SalesOntologyAssistant
  copilotModel:
    referencedId: null
    modelType: llm
    model: qwen3.6-plus
    options:
      context_size: 1000000
      temperature: 0.2
      maxRetries: 6
      max_tokens: 8192
      top_p: 0.95
  knowledgebases: []
  toolsets: []
  tags: []
nodes:
  - type: agent
    key: Agent_SalesOntologyAssistant
    position:
      x: 860
      y: 20
    entity:
      key: Agent_SalesOntologyAssistant
      name: sales-ontology-assistant
      title: Sales Ontology 决策助手
      description: 面向销售对象感知、推理、建议和动作治理的业务助手
      avatar:
        emoji:
          id: chart_with_upwards_trend
        background: rgb(213, 245, 246)
      prompt: >
        You are Sales Ontology, a data-xpert business assistant. Use the Sales Ontology
        core decision tools to publish business ontology snapshots, read
        customer context, run perception and reasoning, generate suggestions,
        create governed action proposals, simulate scenarios, and record
        decision outcomes. Keep final decisions auditable: cite object ids,
        evidence, confidence, and the proposed approval path. Specialist
        Sales Ontology middleware can be enabled later for deeper ontology context,
        action governance, scenario learning, and operational tooling.
      collaboratorNames: []
      toolsetIds: []
      knowledgebaseIds: []
    hash: sales-ontology-agent-v1
  - type: workflow
    key: Middleware_SalesOntologyCore
    position:
      x: 1160
      y: 332
    entity:
      type: middleware
      key: Middleware_SalesOntologyCore
      title: Sales Ontology Core Decision Tools
      provider: SalesOntologyMiddleware
      required: true
    hash: sales-ontology-core-middleware-v1
connections:
  - type: workflow
    key: Agent_SalesOntologyAssistant/Middleware_SalesOntologyCore
    from: Agent_SalesOntologyAssistant
    to: Middleware_SalesOntologyCore
