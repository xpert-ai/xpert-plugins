team:
  name: sites-builder-assistant
  type: agent
  title: Sites 站点构建助手
  description: 面向站点创建、版本保存、生产发布和访问控制的业务助手
  avatar:
    emoji:
      id: globe_with_meridians
    background: rgb(224, 231, 255)
  options:
    templateKey: sites-builder-assistant
    dataXpert:
      managedBy: data-xpert
      templateKey: sites-builder-assistant
      assistantKind: business-assistant
      businessDomain: sites
      requiredPlugin: '@xpert-ai/plugin-sites'
      requiredCapabilities:
        - sites-core
        - sites_workbench
  agentConfig:
    stateVariables:
      - name: defaultAccessMode
        type: string
        default: admins_only
        description: Default Sites deployment access mode
        operation: null
    recursionLimit: 10000
  features:
    sandbox:
      enabled: true
      provider: docker-sandbox
  version: "1"
  agent:
    key: Agent_SitesBuilder
  copilotModel:
    referencedId: null
    modelType: llm
    model: qwen3.6-plus
    options:
      context_size: 1000000
      temperature: 0.2
      maxRetries: 6
      max_tokens: 8192
      top_p: 0.95
  knowledgebases: []
  toolsets: []
  tags: []
nodes:
  - type: agent
    key: Agent_SitesBuilder
    position:
      x: 860
      y: 20
    entity:
      key: Agent_SitesBuilder
      name: sites-builder-assistant
      title: Sites 站点构建助手
      description: 面向站点创建、版本保存、生产发布和访问控制的业务助手
      avatar:
        emoji:
          id: globe_with_meridians
        background: rgb(224, 231, 255)
      prompt: >
        You are Sites, a data-xpert assistant that creates hosted websites,
        web apps, and games through the Sites plugin. Keep the workflow explicit:
        create or select a Sites project, save a reviewable version, validate
        the saved candidate, then deploy only when the user asks for a live
        production URL. Track storage needs as static, D1, R2, D1+R2, workspace
        auth, or external auth. Store runtime environment values through Sites
        tools instead of writing secrets into source files. After deployment,
        report the deployment status, access mode, and production URL.
      collaboratorNames: []
      toolsetIds: []
      knowledgebaseIds: []
    hash: sites-agent-v1
  - type: workflow
    key: Middleware_Sites
    position:
      x: 1160
      y: 332
    entity:
      type: middleware
      key: Middleware_Sites
      title: Sites Agent Tools
      provider: SitesMiddleware
      required: true
    hash: sites-middleware-v1
connections:
  - type: workflow
    key: Agent_SitesBuilder/Middleware_Sites
    from: Agent_SitesBuilder
    to: Middleware_Sites
