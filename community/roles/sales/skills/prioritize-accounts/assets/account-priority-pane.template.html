<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prioritize Accounts</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --panel-soft: #f9fafb;
        --text: #182230;
        --muted: #667085;
        --line: #e4e7ec;
        --line-strong: #d0d5dd;
        --blue: #0b5cab;
        --blue-soft: #e8f1ff;
        --green: #16794c;
        --green-soft: #e9f7ef;
        --amber: #b65e00;
        --amber-soft: #fff4df;
        --red: #b42318;
        --red-soft: #fff1f0;
        --shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scrollbar-gutter: stable;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      html,
      body,
      #app {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Roboto", "Helvetica Neue", Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      button,
      input,
      select {
        color: inherit;
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 58px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: var(--shadow);
        padding: 10px max(16px, calc(((100vw - 1320px) / 2) + 18px));
      }

      .brand {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 10px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
        border-radius: 7px;
        background: var(--blue);
        color: #ffffff;
        font-weight: 900;
      }

      .brand-text {
        min-width: 0;
      }

      .brand-text strong {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .brand-text strong {
        color: #092b5a;
        font-size: 15px;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        min-width: 0;
      }

      .control {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #ffffff;
        color: var(--text);
        padding: 7px 9px;
      }

      .search {
        width: min(280px, 32vw);
      }

      .main {
        display: grid;
        gap: 22px;
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 22px 18px 34px;
      }

      .scenario-panel {
        display: grid;
        gap: 6px;
      }

      .scenario-note {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .scenario-options {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .scenario-button {
        min-height: 26px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #ffffff;
        color: #344054;
        font-size: 12px;
        font-weight: 650;
        line-height: 1;
        padding: 5px 9px;
      }

      .scenario-button:hover {
        border-color: var(--line-strong);
        background: #fbfcfe;
      }

      .scenario-button.is-active {
        border-color: #9cc3f5;
        background: var(--blue-soft);
        color: #092b5a;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .section > .summary-grid {
        padding: 0 12px 12px;
      }

      .metric {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        padding: 10px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        overflow: hidden;
        margin-top: 5px;
        font-size: 20px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .section {
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .section-header {
        display: grid;
        gap: 8px;
        border-bottom: 0;
        background: transparent;
        padding: 0 0 9px;
      }

      .section-title {
        min-width: 0;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 22px;
        line-height: 28px;
        overflow-wrap: anywhere;
      }

      h2 {
        color: #344054;
        font-size: 14px;
        letter-spacing: 0.01em;
        line-height: 18px;
      }

      .subtle {
        color: var(--muted);
        font-size: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        padding: 3px 9px;
        white-space: nowrap;
      }

      .status-text {
        color: var(--muted);
        font-weight: 700;
      }

      .status-text.high {
        color: var(--green);
      }

      .status-text.medium {
        color: var(--amber);
      }

      .status-text.low {
        color: var(--red);
      }

      .tone-ready,
      .tone-ready-now,
      .tone-high {
        background: var(--green-soft);
        color: var(--green);
      }

      .tone-partial,
      .tone-monitor,
      .tone-medium {
        background: var(--amber-soft);
        color: var(--amber);
      }

      .tone-blocked,
      .tone-suppressed,
      .tone-low {
        background: var(--red-soft);
        color: var(--red);
      }

      .tone-info {
        background: var(--blue-soft);
        color: #092b5a;
      }

      .scope-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        padding: 12px;
      }

      .field {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #ffffff;
        padding: 9px;
      }

      .field span {
        display: block;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .field strong {
        display: block;
        margin-top: 3px;
        overflow-wrap: anywhere;
      }

      .table-wrap {
        display: none;
        overflow-x: auto;
        scrollbar-gutter: stable;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #ffffff;
        box-shadow: var(--shadow);
      }

      table {
        width: 100%;
        min-width: 900px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .table-suggested-focus {
        min-width: 1240px;
      }

      .table-monitor {
        min-width: 1120px;
      }

      .table-suppress-or-block {
        min-width: 1100px;
      }

      th {
        border-bottom: 1px solid var(--line-strong);
        background: #f8fafc;
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.04em;
        line-height: 1.25;
        overflow-wrap: anywhere;
        padding: 10px 12px;
        text-align: left;
        text-transform: uppercase;
        white-space: nowrap;
      }

      td {
        border-bottom: 1px solid var(--line);
        padding: 12px;
        vertical-align: top;
        overflow-wrap: anywhere;
      }

      tbody tr:hover {
        background: #f8fbff;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      td strong {
        display: block;
        overflow-wrap: anywhere;
      }

      .col-account {
        width: 160px;
      }

      .col-rank {
        width: 72px;
      }

      .col-confidence,
      .col-status {
        width: 108px;
      }

      .col-contact {
        width: 190px;
      }

      .col-why,
      .col-next {
        width: 260px;
      }

      .col-date {
        width: 145px;
      }

      .col-cleanup {
        width: 240px;
      }

      .col-angle {
        width: 230px;
      }

      .col-opp {
        width: 200px;
      }

      .col-evidence {
        width: 280px;
      }

      .account-link {
        color: var(--blue);
        font-weight: 800;
        text-decoration: none;
      }

      .account-link:hover {
        text-decoration: underline;
      }

      .cards {
        display: block;
        padding: 0;
      }

      .card {
        display: grid;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: var(--shadow);
        padding: 12px 14px;
      }

      .card + .card {
        margin-top: 8px;
      }

      .card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .card-title {
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .card-title > strong {
        font-size: 15px;
        line-height: 1.2;
      }

      .card-meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 14px;
      }

      .card-field {
        min-width: 0;
      }

      .card-field span {
        display: block;
        color: #344054;
        font-size: 10px;
        font-weight: 750;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .card-field.is-cleanup {
        border-left: 0;
        padding-left: 0;
      }

      .card-field.is-cleanup span,
      .inline-note strong {
        color: var(--muted);
      }

      .card-field .card-value {
        display: block;
        margin-top: 3px;
        color: var(--text);
        font-size: 13px;
        overflow-wrap: anywhere;
        font-weight: 400;
        line-height: 1.4;
      }

      .card-note {
        border-top: 1px solid #eef2f7;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        padding-top: 8px;
      }

      .inline-note {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        margin-top: 8px;
      }

      .inline-note strong {
        color: #344054;
      }

      .gaps {
        display: grid;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #ffffff;
        padding: 14px 16px;
      }

      .gap {
        display: grid;
        grid-template-columns: 10px 1fr;
        gap: 9px;
        color: var(--muted);
        font-size: 13px;
      }

      .dot {
        width: 5px;
        height: 5px;
        margin-top: 7px;
        border-radius: 999px;
        background: var(--blue);
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 10px;
        background: #ffffff;
        color: var(--muted);
        padding: 22px;
        text-align: center;
      }

      .footnote {
        color: var(--muted);
        font-size: 12px;
        padding: 0 2px 4px;
      }

      .source-note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        padding: 0 2px 4px;
      }

      .meta-section {
        border-top: 1px solid var(--line);
        padding: 18px 0 0;
      }

      .meta-title {
        color: #344054;
        font-size: 14px;
        font-weight: 650;
        margin-bottom: 10px;
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px 28px;
      }

      .meta-item {
        min-width: 0;
      }

      .meta-item span {
        display: block;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .meta-item strong {
        display: block;
        margin-top: 2px;
        font-size: 13px;
        line-height: 1.4;
        font-weight: 400;
      }

      @media (max-width: 1180px) {
        .summary-grid,
        .scope-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (min-width: 1320px) {
        .main {
          width: min(1320px, 100%);
        }

        .table-wrap {
          display: block;
        }

        .cards {
          display: none;
        }

        .card-grid {
          grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        }
      }

      @media (max-width: 640px) {
        .topbar {
          position: static;
          align-items: stretch;
          flex-direction: column;
        }

        .controls {
          align-items: stretch;
          flex-direction: column;
        }

        .search {
          width: 100%;
        }

        .summary-grid,
        .scope-grid,
        .meta-grid,
        .card-grid {
          grid-template-columns: 1fr;
        }

        .main {
          padding: 10px;
        }
      }

      @media (forced-colors: active) {
        .brand-mark {
          background: Highlight;
          color: HighlightText;
        }

        .field,
        .metric,
        .pill,
        .section,
        .card {
          border: 1px solid CanvasText;
        }
      }
    </style>
  </head>
  <body>
    <script id="prioritize-accounts-data" type="application/json">
__PRIORITIZE_ACCOUNTS_DATA_JSON__
    </script>
    <div id="app"></div>
    <script>
      const templateToken = ["__PRIORITIZE", "ACCOUNTS", "DATA", "JSON__"].join("_");
      const rawData = document.getElementById("prioritize-accounts-data").textContent.trim();
      const data = prepare(parseData(rawData));
      const scenarios = [
        ["balanced", "Balanced", "Default view: balances deal value, timing, customer momentum, CRM hygiene, and clear next action."],
        ["deal-value", "Deal Value", "Favors the largest open opportunities and highest-value accounts first."],
        ["close-soon", "Close Soon", "Favors overdue or near-term opportunities with enough activity to validate, close, or clean up now."],
        ["expansion", "Expansion", "Favors existing customers, renewal or expansion motion, partner/co-sell paths, and strategic upside."],
      ];
      const state = { q: "", filter: "all", scenario: "balanced" };

      function parseData(raw) {
        if (!raw || raw === templateToken) {
          return {
            title: "Prioritize Accounts",
            generatedAt: new Date().toISOString(),
            source: { label: "No source selected", status: "No account ranking loaded" },
            scope: {},
            workNow: [],
            monitor: [],
            suppressOrBlock: [],
            evidenceGaps: ["No account ranking has been loaded yet."],
          };
        }
        try {
          return JSON.parse(raw);
        } catch (error) {
          return {
            title: "Prioritize Accounts",
            generatedAt: new Date().toISOString(),
            source: { label: "Account ranking", status: "Could not load source results" },
            scope: {},
            workNow: [],
            monitor: [],
            suppressOrBlock: [],
            evidenceGaps: ["The account ranking could not be loaded. Regenerate the view from connected source results."],
          };
        }
      }

      function prepare(payload) {
        const workNow = array(payload.workNow || payload.work_now || payload.accounts).map(normalizeWorkNow);
        const monitor = array(payload.monitor).map(normalizeMonitor);
        const suppressOrBlock = array(payload.suppressOrBlock || payload.suppress_or_block || payload.suppressions).map(normalizeSuppress);
        return {
          title: payload.title || "Prioritize Accounts",
          generatedAt: payload.generatedAt || payload.generated_at || new Date().toISOString(),
          source: normalizeSource(payload.source),
          scope: payload.scope || {},
          workNow,
          monitor,
          suppressOrBlock,
          evidenceGaps: array(payload.evidenceGaps || payload.evidence_gaps || payload.gaps),
          nextStep: payload.nextStep || payload.next_step || "",
        };
      }

      function normalizeSource(source) {
        if (!source) return { label: "Connected sources", status: "Source results used" };
        if (typeof source === "string") return { label: source, status: "Source results used" };
        return source;
      }

      function accountUrl(row) {
        return pick(row, "accountUrl", "account_url", "accountRecordUrl", "account_record_url", "accountSourceUrl", "account_source_url", "sourceUrl", "source_url", "recordUrl", "record_url", "url", "Url", "link", "Link", "account.url", "Account.url");
      }

      function normalizeWorkNow(row, index) {
        return {
          rank: pick(row, "rank", "Rank") || index + 1,
          account: pick(row, "account", "Account", "name", "Name"),
          accountUrl: accountUrl(row),
          motion: pick(row, "motion", "Motion"),
          whyNow: pick(row, "whyNow", "why_now", "Why Now", "Reason"),
          crmNextStep: pick(row, "crmNextStep", "crm_next_step", "CRM Next Step", "nextStepFromCrm", "next_step_from_crm"),
          closeDate: pick(row, "closeDate", "close_date", "Close Date", "dueDate", "due_date", "Due Date"),
          urgency: pick(row, "urgency", "Urgency", "timing", "Timing"),
          stageForecast: pick(row, "stageForecast", "stage_forecast", "Stage / Forecast", "stage", "Stage"),
          lastInteraction: pick(row, "lastInteraction", "last_interaction", "Last Interaction", "lastActivity", "last_activity"),
          primaryContact: pick(row, "primaryContact", "primary_contact", "Primary Contact"),
          secondaryContact: pick(row, "secondaryContact", "secondary_contact", "Secondary Contact") || "None",
          oppRecommendation: pick(row, "oppRecommendation", "opp_recommendation", "Opp Recommendation"),
          nextStep: pick(row, "nextStep", "next_step", "suggestedNextStep", "suggested_next_step", "Suggested Next Step", "Next Step"),
          crmCleanup: pick(row, "crmCleanup", "crm_cleanup", "Suggested CRM Cleanup", "cleanup", "Cleanup"),
          sequenceAngle: pick(row, "sequenceAngle", "sequence_angle", "Sequence Angle"),
          confidence: pick(row, "confidence", "Confidence"),
          status: pick(row, "status", "Status") || "ready_now",
        };
      }

      function normalizeMonitor(row) {
        return {
          account: pick(row, "account", "Account", "name", "Name"),
          accountUrl: accountUrl(row),
          motion: pick(row, "motion", "Motion"),
          reasonToMonitor: pick(row, "reasonToMonitor", "reason_to_monitor", "Reason To Monitor", "Reason"),
          triggerToRevisit: pick(row, "triggerToRevisit", "trigger_to_revisit", "Trigger To Revisit", "Trigger"),
          crmCleanup: pick(row, "crmCleanup", "crm_cleanup", "Suggested CRM Cleanup", "cleanup", "Cleanup"),
          status: pick(row, "status", "Status") || "monitor",
        };
      }

      function normalizeSuppress(row) {
        return {
          account: pick(row, "account", "Account", "name", "Name"),
          accountUrl: accountUrl(row),
          motion: pick(row, "motion", "Motion"),
          suppressorOrBlocker: pick(row, "suppressorOrBlocker", "suppressor_or_blocker", "Suppressor Or Blocker", "Blocker"),
          evidence: pick(row, "evidence", "Evidence"),
          crmCleanup: pick(row, "crmCleanup", "crm_cleanup", "Suggested CRM Cleanup", "cleanup", "Cleanup"),
          status: pick(row, "status", "Status") || "suppressed",
        };
      }

      function pick(record, ...keys) {
        for (const key of keys) {
          const value = key.split(".").reduce((current, part) => current?.[part], record);
          if (value !== undefined && value !== null && String(value).trim() !== "") return value;
        }
        return "";
      }

      function array(value) {
        return Array.isArray(value) ? value : value ? [value] : [];
      }

      function text(value) {
        if (value === null || value === undefined || value === "") return "";
        if (typeof value === "object") {
          const name = pick(value, "name", "Name");
          const title = pick(value, "title", "Title", "role", "Role");
          const email = pick(value, "email", "Email");
          return [name, title, email].filter(Boolean).join(" - ") || JSON.stringify(value);
        }
        return String(value);
      }

      function esc(value) {
        return humanizeDates(text(value)).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]);
      }

      function humanizeDates(value) {
        return String(value).replace(/\b(\d{4})-(\d{2})-(\d{2})(?:[T ][0-9:.]+(?:Z|[+-]\d{2}:?\d{2})?)?\b/g, (_, year, month, day) => humanDate(year, month, day));
      }

      function humanDate(year, month, day) {
        const numericYear = Number(year);
        const date = new Date(Date.UTC(numericYear, Number(month) - 1, Number(day)));
        if (Number.isNaN(date.valueOf())) return [year, month, day].join("-");
        const options = { month: "short", day: "numeric", timeZone: "UTC" };
        if (numericYear !== new Date().getFullYear()) options.year = "numeric";
        return new Intl.DateTimeFormat(undefined, options).format(date);
      }

      function safeUrl(value) {
        const url = String(value || "").trim();
        return /^https?:\/\//i.test(url) ? url : "";
      }

      function linkedText(label, url, className = "") {
        const href = safeUrl(url);
        const classAttr = className ? ` class="${esc(className)}"` : "";
        return href
          ? `<a${classAttr} href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`
          : `<span${classAttr}>${esc(label)}</span>`;
      }

      function statusTone(status) {
        const normalized = String(status || "").toLowerCase().replace(/[^a-z]+/g, "-");
        if (["high", "ready-now", "ready"].includes(normalized)) return "high";
        if (["medium", "partial", "monitor", "watch"].includes(normalized)) return "medium";
        if (["low", "blocked", "suppressed"].includes(normalized)) return "low";
        return normalized || "info";
      }

      function matches(row) {
        const haystack = searchableText(row).toLowerCase();
        const queryMatch = !state.q || haystack.includes(state.q.toLowerCase());
        return queryMatch;
      }

      function searchableText(row) {
        return text(row.account);
      }

      function renderMetric(label, value) {
        return `<div class="metric"><span>${esc(label)}</span><strong>${esc(value)}</strong></div>`;
      }

      function renderRunDetails(counts) {
        const scope = data.scope || {};
        const fields = [
          ["Source of truth", pick(scope, "sourceOfTruth", "source_of_truth", "sourceScope", "source_scope")],
          ["Sources checked", array(pick(scope, "sourcesChecked", "sources_checked", "evidenceLanes", "evidence_lanes")).join(", ") || pick(scope, "evidence", "sources")],
          ["Last updated", dateText(data.generatedAt)],
          ["Account set", pick(scope, "accountSet", "account_set")],
          ["Ranking basis", pick(scope, "rankingBasis", "ranking_basis")],
          ["Assumptions", pick(scope, "assumptions")],
        ];
        return `
          <section class="meta-section" id="run-details">
            <div class="meta-title">Source & Run Details</div>
            <div class="meta-grid">
              ${fields.map(([label, value]) => `<div class="meta-item"><span>${esc(label)}</span><strong>${esc(value || "Not available")}</strong></div>`).join("")}
            </div>
          </section>
        `;
      }

      function activeScenario() {
        return scenarios.find(([key]) => key === state.scenario) || scenarios[0];
      }

      function renderScenarioBar() {
        const [, , description] = activeScenario();
        return `
          <section class="scenario-panel" aria-label="Prioritization scenario">
            <div class="scenario-options" role="group" aria-label="Choose prioritization scenario">
              ${scenarios.map(([key, label]) => `
                <button class="scenario-button ${key === state.scenario ? "is-active" : ""}" type="button" data-scenario="${esc(key)}" aria-pressed="${key === state.scenario ? "true" : "false"}">${esc(label)}</button>
              `).join("")}
            </div>
            <div class="scenario-note">${esc(description)}</div>
          </section>
        `;
      }

      function scenarioRows(rows) {
        return rows
          .map((row, index) => ({ row, index, score: scenarioScore(row) }))
          .sort((a, b) => (b.score - a.score) || (a.index - b.index))
          .map(({ row }, index) => ({ ...row, rank: index + 1 }));
      }

      function scenarioScore(row) {
        if (state.scenario === "balanced" || state.scenario === "deal-value") return Number.MAX_SAFE_INTEGER - Number(row.rank || 0);
        const body = [
          row.account,
          row.motion,
          row.whyNow,
          row.closeDate,
          row.urgency,
          row.stageForecast,
          row.lastInteraction,
          row.oppRecommendation,
          row.nextStep,
          row.reasonToMonitor,
          row.triggerToRevisit,
          row.suppressorOrBlocker,
          row.evidence,
          row.crmCleanup,
        ].map(text).join(" ").toLowerCase();
        const weights = {
          "close-soon": [
            [/overdue|past target|close date|due soon|near-term|this month|recent meeting|recent customer|active recently/g, 4],
            [/mutual action|confirm|validate|close plan|signer|decision/g, 2],
            [/no recent|missing|stale|blank/g, -1],
          ],
          "expansion": [
            [/expansion|renewal|existing|customer|strategic|highest-value|high-value|commit|co-sell|aws|partner|multi-product|deployment|recent meeting|momentum/g, 4],
            [/\$|value|acv|renewal value|commercial path/g, 2],
            [/0%|omitted|stale 2024|small/g, -3],
          ],
        };
        return (weights[state.scenario] || []).reduce((score, [pattern, weight]) => {
          const matches = body.match(pattern);
          return score + (matches ? matches.length * weight : 0);
        }, 0);
      }

      function renderWorkNow() {
        const rows = scenarioRows(data.workNow.filter(matches));
        return renderSection(
          "Suggested Focus",
          rows.length,
          workColumns(rows),
          rows,
          renderWorkCard,
          "No suggested focus accounts match the current filter.",
          renderScenarioBar(),
        );
      }

      function renderMonitor() {
        const rows = scenarioRows(data.monitor.filter(matches));
        const columns = [
          ["Account", "account", "col-account"],
          ["Reason To Monitor", "reasonToMonitor", "col-why"],
          ["Trigger To Revisit", "triggerToRevisit", "col-next"],
          ...cleanupColumn(rows),
        ];
        return renderSection(
          "Monitor",
          rows.length,
          columns,
          rows,
          renderMonitorCard,
          "No monitor accounts.",
        );
      }

      function renderSuppress() {
        const rows = scenarioRows(data.suppressOrBlock.filter(matches));
        const columns = [
          ["Account", "account", "col-account"],
          ["Suppressor Or Blocker", "suppressorOrBlocker", "col-why"],
          ["Evidence", "evidence", "col-evidence"],
          ...cleanupColumn(rows),
        ];
        return renderSection(
          "Suppress Or Block",
          rows.length,
          columns,
          rows,
          renderSuppressCard,
          "No suppressed or blocked accounts.",
        );
      }

      function workColumns(rows) {
        return [
          ["Priority", "rank", "col-rank"],
          ["Account", "account", "col-account"],
          ["Timing", "closeDate", "col-date"],
          ["Why", "whyNow", "col-why"],
          ["Suggested Next Step", "nextStep", "col-next"],
          ...cleanupColumn(rows),
          ["Confidence", "confidence", "col-confidence"],
        ];
      }

      function cleanupColumn(rows) {
        return rows.some((row) => text(row.crmCleanup)) ? [["Suggested CRM Cleanup", "crmCleanup", "col-cleanup"]] : [];
      }

      function renderSection(title, count, columns, rows, cardRenderer, emptyText, headerContent = "") {
        const sectionId = title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
        return `
          <section class="section" data-section="${esc(title)}">
            <div class="section-header">
              <div class="section-title"><h2>${esc(title)}${count ? ` (${count})` : ""}</h2></div>
              ${headerContent}
            </div>
            ${
              rows.length
                ? `<div class="table-wrap"><table class="table-${esc(sectionId)}">
                    <thead><tr>${columns.map(([label, , className]) => `<th class="${className || ""}">${esc(label)}</th>`).join("")}</tr></thead>
                    <tbody>${rows.map((row) => renderRow(columns, row)).join("")}</tbody>
                  </table></div>
                  <div class="cards">${rows.map(cardRenderer).join("")}</div>`
                : `<div class="empty">${esc(emptyText)}</div>`
            }
          </section>
        `;
      }

      function renderRow(columns, row) {
        return `<tr>${columns
          .map(([, key]) => {
            const value = row[key];
            if (key === "account") return `<td>${linkedText(value, row.accountUrl, "account-link")}</td>`;
            if (key === "status") return `<td><span class="status-text ${statusTone(value)}">${esc(statusLabel(value))}</span></td>`;
            if (key === "confidence") return `<td><span class="status-text ${statusTone(value)}">${esc(value)}</span></td>`;
            return `<td>${esc(value)}</td>`;
          })
          .join("")}</tr>`;
      }

      function renderCard(title, rows, status, titleUrl = "", meta = [], note = "") {
        const metaText = meta.filter(([, value]) => value).map(([label, value]) => `${label}: ${value}`).join(" · ");
        return `
          <article class="card">
            <div class="card-top">
              <div class="card-title">
                <strong>${linkedText(title, titleUrl, "account-link")}</strong>
                ${metaText ? `<div class="card-meta">${esc(metaText)}</div>` : ""}
              </div>
            </div>
            <div class="card-grid">
              ${rows.map(([label, value]) => `<div class="card-field ${/cleanup/i.test(label) ? "is-cleanup" : ""}"><span>${esc(label)}</span><div class="card-value">${esc(value)}</div></div>`).join("")}
            </div>
            ${note ? `<div class="card-note">${esc(note)}</div>` : ""}
          </article>
        `;
      }

      function renderWorkCard(row) {
        return renderCard(`#${row.rank} ${row.account}`, [
          ["Why", row.whyNow],
          ["Suggested Next Step", row.nextStep],
          ...(row.crmCleanup ? [["Suggested CRM Cleanup", row.crmCleanup]] : []),
        ], row.status, row.accountUrl, [
          ["Timing", row.closeDate],
          ["Stage", row.stageForecast],
          ["Confidence", row.confidence],
        ], [row.urgency, row.lastInteraction].filter(Boolean).join(" "));
      }

      function statusLabel(status) {
        const normalized = String(status || "").toLowerCase().replace(/[^a-z]+/g, "-");
        const labels = {
          "ready-now": "Ready",
          "ready": "Ready",
          "partial": "Needs cleanup",
          "monitor": "Monitor",
          "suppressed": "Suppressed",
          "blocked": "Blocked",
        };
        return labels[normalized] || text(status);
      }

      function renderMonitorCard(row) {
        return renderCard(row.account, [
          ["Reason To Monitor", row.reasonToMonitor],
          ["Trigger To Revisit", row.triggerToRevisit],
          ...(row.crmCleanup ? [["Suggested CRM Cleanup", row.crmCleanup]] : []),
        ], row.status, row.accountUrl);
      }

      function renderSuppressCard(row) {
        return renderCard(row.account, [
          ["Suppressor Or Blocker", row.suppressorOrBlocker],
          ["Evidence", row.evidence],
          ...(row.crmCleanup ? [["Suggested CRM Cleanup", row.crmCleanup]] : []),
        ], row.status, row.accountUrl);
      }

      function renderGaps() {
        const gaps = data.evidenceGaps.map(text).filter(Boolean);
        return `
          <section class="section">
            <div class="section-header">
              <div class="section-title"><h2>Evidence Gaps</h2></div>
            </div>
            ${gaps.length ? `<div class="gaps">${gaps.map((gap) => `<div class="gap"><span class="dot"></span><span>${esc(gap)}</span></div>`).join("")}</div>` : `<div class="empty">No material evidence gaps called out.</div>`}
          </section>
        `;
      }

      function dateText(value) {
        const match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})/);
        return match ? humanDate(match[1], match[2], match[3]) : humanizeDates(value || "");
      }

      function render() {
        const app = document.getElementById("app");
        app.innerHTML = `
          <div class="shell">
            <header class="topbar">
              <div class="brand">
                <div class="brand-mark">S</div>
                <div class="brand-text"><strong>Prioritize Accounts</strong></div>
              </div>
              <div class="controls">
                <input class="control search" id="q" placeholder="Search" value="${esc(state.q)}" />
              </div>
            </header>
            <main class="main" id="results"></main>
          </div>
        `;
        renderResults();
      }

      function renderResults() {
        const results = document.getElementById("results");
        if (!results) return;
        const visibleWorkNow = data.workNow.filter(matches).length;
        const visibleMonitor = data.monitor.filter(matches).length;
        const visibleSuppress = data.suppressOrBlock.filter(matches).length;
        results.innerHTML = `
          ${renderWorkNow()}
          ${renderMonitor()}
          ${renderSuppress()}
          ${renderGaps()}
          ${renderRunDetails({ workNow: visibleWorkNow, monitor: visibleMonitor, suppress: visibleSuppress })}
        `;
      }

      document.addEventListener("input", (event) => {
        if (event.target.id === "q") {
          state.q = event.target.value;
          renderResults();
        }
      });

      document.addEventListener("click", (event) => {
        const button = event.target.closest("[data-scenario]");
        if (!button) return;
        state.scenario = button.getAttribute("data-scenario") || "balanced";
        renderResults();
      });

      render();
    </script>
  </body>
</html>
