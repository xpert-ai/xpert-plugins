packages:
  - ../packages/*
  - apps/*
  - packages/*
  - integrations/*
  - examples/*
  - tools/*
  - models/*
  - databases/*
  - middlewares/*
  - skills/*

overrides:
  i18next: 25.6.0
  i18next-fs-backend: 2.6.0

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@sap/hana-client'
  - '@swc/core'
  - cpu-features
  - msgpackr-extract
  - nx
  - protobufjs
  - sharp
  - ssh2
  - unrs-resolver

allowBuilds:
  '@nestjs/core': true
  '@sap/hana-client': true
  '@swc/core': true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  nx: true
  protobufjs: true
  sharp: true
  ssh2: true
  unrs-resolver: true
