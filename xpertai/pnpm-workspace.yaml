packages:
  - ../packages/*
  - apps/*
  - packages/*
  - integrations/*
  - examples/*
  - tools/*
  - models/*
  - databases/*
  - middlewares/*
  - skills/*

overrides:
  '@xpert-ai/plugin-sdk@3.12.1>@xpert-ai/contracts': 3.12.1
  i18next: 25.6.0
  i18next-fs-backend: 2.6.0

minimumReleaseAgeExclude:
  - '@xpert-ai/*'
  - '@lucide/vue@1.24.0'

allowBuilds:
  '@nestjs/core': true
  '@sap/hana-client': true
  '@swc/core': true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  nx: true
  protobufjs: true
  sharp: true
  ssh2: true
  unrs-resolver: true
