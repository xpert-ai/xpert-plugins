packages:
  - ../packages/*
  - apps/*
  - packages/*
  - integrations/*
  - examples/*
  - tools/*
  - models/*
  - databases/*
  - middlewares/*
  - skills/*

overrides:
  '@xpert-ai/plugin-sdk@3.12.1>@xpert-ai/contracts': 3.12.1
  i18next: 25.6.0
  i18next-fs-backend: 2.6.0

minimumReleaseAgeExclude:
  - '@xpert-ai/*'
  - '@lucide/vue@1.24.0'
  - '@hyperframes/core@0.7.63'
  - '@hyperframes/engine@0.7.63'
  - '@hyperframes/lint@0.7.63'
  - '@hyperframes/parsers@0.7.63'
  - '@hyperframes/player@0.7.63'
  - '@hyperframes/producer@0.7.63'
  - '@hyperframes/sdk@0.7.63'
  - '@hyperframes/studio-server@0.7.63'

allowBuilds:
  '@nestjs/core': true
  '@sap/hana-client': true
  '@swc/core': true
  core-js: true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  nx: true
  # Cut bundles only the browser runtime; never execute the unused native Node installer.
  onnxruntime-node: false
  protobufjs: true
  # HyperFrames Producer uses the platform Runtime Chromium; never download a plugin-local browser.
  puppeteer: false
  sharp: true
  ssh2: true
  unrs-resolver: true
  vue-demi: true
