  avatar:
    emoji:
      id: toolbox
    background: rgb(224, 242, 254)
  options:
    templateKey: lark-admin-assistant
    xpert:
      managedBy: xpert
      templateKey: lark-admin-assistant
      assistantKind: lark-admin-assistant
