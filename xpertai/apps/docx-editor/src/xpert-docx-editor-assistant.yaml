team:
  name: docx-editor-assistant
  type: agent
  title: DOCX 文档审阅助手
  description: 面向 DOCX 在线编辑、批注、修订建议和版本化保存的业务助手
  avatar:
    emoji:
      id: memo
    background: rgb(219, 234, 254)
  options:
    templateKey: docx-editor-assistant
    dataXpert:
      managedBy: data-xpert
      templateKey: docx-editor-assistant
      assistantKind: business-assistant
      businessDomain: docx-editor
      requiredPlugin: '@xpert-ai/plugin-docx-editor'
      requiredPlugins:
        - '@xpert-ai/plugin-docx-editor'
      requiredCapabilities:
        - docx-editor
        - docx-editor-workbench
        - docx-editor-agent-review
  agentConfig:
    stateVariables:
      - name: currentDocumentId
        type: string
        default: ""
        description: Current DOCX Editor document id selected in the Workbench
        operation: null
    recursionLimit: 10000
  features:
    sandbox:
      enabled: true
      provider: docker-sandbox
  version: "1"
  agent:
    key: Agent_DocxEditor
  copilotModel:
    referencedId: null
    modelType: llm
    model: qwen3.6-plus
    options:
      context_size: 1000000
      temperature: 0.2
      maxRetries: 6
      max_tokens: 8192
      top_p: 0.95
  knowledgebases: []
  toolsets: []
  tags: []
nodes:
  - type: agent
    key: Agent_DocxEditor
    position:
      x: 860
      y: 20
    entity:
      key: Agent_DocxEditor
      name: docx-editor-assistant
      title: DOCX 文档审阅助手
      description: 面向 DOCX 在线编辑、批注、修订建议和版本化保存的业务助手
      avatar:
        emoji:
          id: memo
        background: rgb(219, 234, 254)
      prompt: >
        You are DOCX Editor Assistant, a data-xpert business assistant for
        DOCX document reading, browser editing, comments, tracked changes,
        formatting, and versioned review.

        Work only from explicit DOCX Editor context. Every tool call must include
        the exact documentId from the Workbench, user message, tool result, or
        currentDocumentId state. Do not invent document ids, paragraph ids,
        comment ids, version ids, or file names.

        Document review workflow:
        1. Ask the user to upload or select a DOCX document in the DOCX Editor Workbench when no documentId is available.
        2. Call docx_read_document or docx_find_text before adding comments, suggesting changes, or applying formatting.
        3. Use stable paraId handles returned by the tools. Never locate paragraphs by display order, localized labels, or guessed text combinations.
        4. For comments, call docx_add_comment with paraId, text, and optional search when the phrase is unique.
        5. For edits, follow the current Workbench mode when it is available: in suggesting mode prefer docx_suggest_change so the user can accept or reject tracked changes; in editing mode direct modification tools are acceptable when they exist; in viewing mode treat the document as read-only unless the user explicitly asks to modify it.
        6. For formatting, call docx_apply_formatting or docx_set_paragraph_style only after confirming the target paraId.
        7. Use docx_read_comments and docx_read_changes to summarize pending review items.
        8. To process review items, use docx_accept_change, docx_reject_change, docx_accept_all_changes, docx_reject_all_changes, docx_resolve_comment, docx_resolve_all_comments, docx_delete_comment, or docx_delete_all_comments after reading current ids.
        9. Use docx_read_selection, docx_read_page, docx_read_pages, and docx_scroll only when the Workbench has a live snapshot; if unavailable, ask the user to open the Workbench.

        Do not claim a document was saved unless a tool or Workbench action returns a saved version. Prefer concise Chinese responses unless the user asks otherwise.
      collaboratorNames: []
      toolsetIds: []
      knowledgebaseIds: []
    hash: docx-editor-agent-v1
  - type: workflow
    key: Middleware_DocxEditor
    position:
      x: 1160
      y: 332
    entity:
      type: middleware
      key: Middleware_DocxEditor
      title: DOCX Editor Tools
      provider: DocxEditorMiddleware
      required: true
    hash: docx-editor-middleware-v1
connections:
  - type: workflow
    key: Agent_DocxEditor/Middleware_DocxEditor
    from: Agent_DocxEditor
    to: Middleware_DocxEditor
