      enabled: true
      provider: docker-sandbox
  version: "1"
  agent:
    key: Agent_Canvas
  copilotModel:
    referencedId: null
    modelType: llm
    model: qwen3.6-plus
    options:
      context_size: 1000000
      temperature: 0.2
      maxRetries: 6
      max_tokens: 8192
      top_p: 0.95
  knowledgebases: []
  toolsets:
    - id: 9e7f0f3d-1f0d-4c59-9f14-7012dc2a0f4c
