          avatar:
            url: https://api.mtda.cloud/api/xpert-toolset/builtin-provider/seedream_aigc/icon
        toolPositions:
          seedream_text_to_image: 0
      privacyPolicy: null
      customDisclaimer: null
      tags: []
      tools:
        - id: d905500d-68f8-4bb5-897d-d5a60dc84f13
          name: seedream_text_to_image
          description: null
          avatar: null
          enabled: true
          disabled: null
          parameters: null
          options: null
