      type: seedream_aigc
      category: builtin
      description: Generate images with Volcengine Doubao Seedream models.
      avatar:
        url: https://api.mtda.cloud/api/xpert-toolset/builtin-provider/seedream_aigc/icon
      options:
        provider:
          author: Xpert AI
          name: seedream_aigc
          label:
            en_US: Seedream AIGC
            zh_Hans: 即梦 AIGC
          description:
            en_US: Generate and edit images and videos with Volcengine Ark Seedream and Seedance models.
            zh_Hans: 通过火山方舟即梦 Seedream 和 Seedance 模型生成、编辑图片和视频。
          icon: icon.svg
          tags:
