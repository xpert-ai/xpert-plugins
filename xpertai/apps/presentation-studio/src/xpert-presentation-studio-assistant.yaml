team:
  name: presentation-studio-assistant
  type: agent
  title: Presentation Studio Assistant
  description: Agentic presentation generation, validation, collaboration, versioning, and export
  avatar:
    emoji:
      id: bar_chart
    background: rgb(237, 233, 254)
  options:
    templateKey: presentation-studio-assistant
    dataXpert:
      managedBy: data-xpert
      templateKey: presentation-studio-assistant
      assistantKind: business-assistant
      businessDomain: presentation-studio
      requiredPlugin: '@xpert-ai/plugin-presentation-studio'
      requiredPlugins:
        - '@xpert-ai/plugin-presentation-studio'
      requiredCapabilities:
        - presentation-studio
        - presentation-generation
        - presentation-workbench
        - presentation-collaboration
        - presentation-export
  agentConfig:
    stateVariables:
      - name: presentationDeckId
        type: string
        default: ""
        description: Current Presentation Studio deck id
        operation: null
      - name: presentationRevision
        type: number
        default: 0
        description: Current deck revision for conflict-safe mutations
        operation: null
    recursionLimit: 10000
  features:
    sandbox:
      enabled: true
      provider: docker-sandbox
  version: "1"
  agent:
    key: Agent_PresentationStudio
  copilotModel:
    referencedId: null
    modelType: llm
    model: qwen3.6-plus
    options:
      context_size: 1000000
      temperature: 0.2
      maxRetries: 6
      max_tokens: 8192
nodes:
  - type: agent
    key: Agent_PresentationStudio
    position: { x: 860, y: 20 }
    entity:
      key: Agent_PresentationStudio
      name: presentation-studio-assistant
      title: Presentation Studio Assistant
      description: Generate and export reviewable DashiAI presentations
      avatar:
        emoji: { id: bar_chart }
        background: rgb(237, 233, 254)
      prompt: >
        You are Presentation Studio Assistant. Treat Presentation Studio middleware
        tools as the system of record and never claim that a deck, version, asset,
        or export exists unless its tool call succeeded.

        Before creating a deck, call presentation_list_typography_presets and
        choose a preset that fits the audience, theme, and language. Use only the
        returned managed font families; never invent or modify font URLs.

        Use only structured text and media references already present in Xpert
        context. Do not attempt to parse binary documents inside this plugin.

        Workflow:
        1. Create a deck with one themePack and the requested page count.
        2. Search layouts by page role. Inspect every chosen layout before writing it.
           presentation_inspect_layouts accepts at most 8 layouts per call; split
           larger selections into sequential batches of 8 or fewer.
        3. Register workspace media with presentation_add_asset and use returned
           asset:// identifiers in writable media props.
        4. Add one slide at a time. Use a unique layout for each active slide and
           obey fill plans, copy budgets, count bindings, controls, and media slots.
           For array props, use authoringContract.arrayItemContracts exactly. Array
           items may contain only allowedKeys. Keep top-level fields such as desc
           and en at the top level unless the inspected item contract explicitly
           allows them; never infer nested fields from another layout.
        5. Re-read the deck if a revision conflict occurs, then retry the narrow patch.
        6. Finalize only when active slide count equals pageCount and all content is real.
        7. Request HTML, PDF, or PPTX exports and poll presentation_get_export.
        8. When the user explicitly asks to share the presentation, call
           presentation_share_html. If it returns pending, poll the returned exportId
           with presentation_get_export and call presentation_share_html again after
           the export succeeds. Return the shareUrl to the user. This tool never creates
           anonymous public access.
        9. Report failures with presentation_report_failure instead of inventing layouts.

        Match the user's language.
      collaboratorNames: []
      toolsetIds: []
      knowledgebaseIds: []
    hash: presentation-studio-agent-v2
  - type: workflow
    key: Middleware_PresentationStudio
    position: { x: 1160, y: 332 }
    entity:
      type: middleware
      key: Middleware_PresentationStudio
      title: Presentation Studio Tools
      provider: PresentationStudioMiddleware
      required: true
    hash: presentation-studio-middleware-v1
  - type: workflow
    key: Middleware_Skills
    position: { x: 580, y: 332 }
    entity:
      type: middleware
      key: Middleware_Skills
      title: Skills Middleware
      provider: skillsMiddleware
      required: true
    hash: presentation-studio-skills-middleware-v1
  - type: workflow
    key: Middleware_WebTools
    position: { x: 820, y: 480 }
    entity:
      type: middleware
      key: Middleware_WebTools
      title: Web Tools
      provider: WebTools
      required: true
    hash: presentation-studio-web-tools-middleware-v1
  - type: workflow
    key: Middleware_SandboxFile
    position: { x: 1460, y: 332 }
    entity:
      type: middleware
      key: Middleware_SandboxFile
      title: Sandbox File
      provider: SandboxFile
      required: true
    hash: presentation-studio-sandbox-file-middleware-v1
  - type: workflow
    key: Middleware_SandboxShell
    position: { x: 1460, y: 480 }
    entity:
      type: middleware
      key: Middleware_SandboxShell
      title: Sandbox Shell
      provider: SandboxShell
      required: true
    hash: presentation-studio-sandbox-shell-middleware-v1
  - type: workflow
    key: Middleware_LoopGuard
    position: { x: 960, y: 660 }
    entity:
      type: middleware
      key: Middleware_LoopGuard
      title: Loop Guard
      provider: LoopGuardMiddleware
      required: true
    hash: presentation-studio-loop-guard-middleware-v1
  - type: workflow
    key: Middleware_ModelRetry
    position: { x: 1160, y: 520 }
    entity:
      type: middleware
      key: Middleware_ModelRetry
      title: Model Retry
      provider: ModelRetryMiddleware
      required: true
      options:
        maxRetries: 2
        initialDelayMs: 1000
        backoffFactor: 2
        maxDelayMs: 60000
        jitter: true
        retryAllErrors: true
        retryableErrorNames: []
        retryableStatusCodes: []
        retryableMessageIncludes: []
        onFailure: continue
    hash: presentation-studio-model-retry-middleware-v1
  - type: workflow
    key: Middleware_ViewImage
    position: { x: 1720, y: 480 }
    entity:
      type: middleware
      key: Middleware_ViewImage
      title: View Image
      provider: ViewImageMiddleware
      required: true
    hash: presentation-studio-view-image-middleware-v1
connections:
  - type: workflow
    key: Agent_PresentationStudio/Middleware_PresentationStudio
    from: Agent_PresentationStudio
    to: Middleware_PresentationStudio
  - type: workflow
    key: Agent_PresentationStudio/Middleware_Skills
    from: Agent_PresentationStudio
    to: Middleware_Skills
  - type: workflow
    key: Agent_PresentationStudio/Middleware_WebTools
    from: Agent_PresentationStudio
    to: Middleware_WebTools
  - type: workflow
    key: Agent_PresentationStudio/Middleware_SandboxFile
    from: Agent_PresentationStudio
    to: Middleware_SandboxFile
  - type: workflow
    key: Agent_PresentationStudio/Middleware_SandboxShell
    from: Agent_PresentationStudio
    to: Middleware_SandboxShell
  - type: workflow
    key: Agent_PresentationStudio/Middleware_LoopGuard
    from: Agent_PresentationStudio
    to: Middleware_LoopGuard
  - type: workflow
    key: Agent_PresentationStudio/Middleware_ModelRetry
    from: Agent_PresentationStudio
    to: Middleware_ModelRetry
  - type: workflow
    key: Agent_PresentationStudio/Middleware_ViewImage
    from: Agent_PresentationStudio
    to: Middleware_ViewImage
