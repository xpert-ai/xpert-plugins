team:
  name: pencil-assistant
  type: agent
  title: Pencil Assistant
  description: Agentic design assistant for Pencil documents, Figma imports, node edits, exports, and reviewable versions
  avatar:
    url: data:image/svg+xml;base64,
    background: rgb(255, 255, 255)
  options:
    templateKey: pencil-assistant
    dataXpert:
      managedBy: data-xpert
      templateKey: pencil-assistant
      assistantKind: business-assistant
      businessDomain: pencil
      requiredPlugin: '@xpert-ai/plugin-pencil'
      requiredPlugins:
        - '@xpert-ai/plugin-pencil'
        - '@xpert-ai/plugin-view-image'
      requiredCapabilities:
        - pencil
        - pencil-workbench
        - agent-pencil
  agentConfig:
    stateVariables:
      - name: pencilDocumentId
        type: string
        default: ""
        description: Current Pencil document id selected in the workbench
        operation: null
      - name: pencilVersionId
        type: string
        default: ""
        description: Current Pencil version id selected in the workbench
        operation: null
      - name: pencilNodeId
        type: string
        default: ""
        description: Current Pencil node id selected in the workbench
        operation: null
      - name: pencilSelectionJson
        type: string
        default: ""
        description: Current Pencil selection context JSON from the workbench
        operation: null
      - name: pencilContextJson
        type: string
        default: ""
        description: Current Pencil document and working graph context JSON from the workbench
        operation: null
      - name: pencilDirty
        type: string
        default: ""
        description: Whether the current Pencil workbench has unsaved local changes
        operation: null
    recursionLimit: 10000
  features:
    sandbox:
      enabled: true
      provider: docker-sandbox
  version: "1"
  agent:
    key: Agent_Pencil
  copilotModel:
    referencedId: null
    modelType: llm
    model: qwen3.6-plus
    options:
      context_size: 1000000
      temperature: 0.2
      maxRetries: 6
      max_tokens: 8192
      top_p: 0.95
  knowledgebases: []
  toolsets: []
  tags: []
nodes:
  - type: agent
    key: Agent_Pencil
    position:
      x: 860
      y: 20
    entity:
      key: Agent_Pencil
      name: pencil-assistant
      title: Pencil Assistant
      description: Agentic design assistant for Pencil documents, Figma imports, node edits, exports, and reviewable versions
      avatar:
        url: data:image/svg+xml;base64,
        background: rgb(255, 255, 255)
      prompt: >
        You are Pencil Assistant, a data-xpert business assistant for creating
        and managing reviewable Pencil design documents.

        Use Pencil middleware tools as the system of record. Do not claim that
        a document, version, import, export, or node edit was saved unless the
        relevant tool call succeeded.

        Before creating a new visual design, call pencil_list_typography_presets,
        choose a preset that fits the content and language, and use only its
        returned managed font family names. Never invent or modify font URLs.

        Runtime Pencil Workbench context rendered from request state variables
        may be empty when no document or node is selected:
        - pencilDocumentId: {{env.pencilDocumentId}}
        - pencilVersionId: {{env.pencilVersionId}}
        - pencilNodeId: {{env.pencilNodeId}}
        - pencilSelectionJson: {{{env.pencilSelectionJson}}}
        - pencilContextJson: {{{env.pencilContextJson}}}
        - pencilDirty: {{env.pencilDirty}}

        If pencilContextJson is non-empty, parse it as the current Workbench
        context. Prefer pencilDocumentId as the current document unless the
        user explicitly asks to work on another document.

        Pencil workflow:
        1. If pencilDocumentId is non-empty and the user asks for edits,
           imports into the current file, exports, or review, use that document.
           Do not create a new document unless the user asks for one.
        2. Before modifying an existing document, call pencil_get_document.
           For targeted changes to a node, call pencil_get_node first.
        3. Use the selected Pencil core tools with the pencil_ prefix for
           node, layout, style, structure, variable, analysis, and export helper
           operations. The documentId must always be provided.
           For a complex page, do not render the complete page in one large
           pencil_render call. First render a small empty root frame, retain its
           returned id, then render one major region at a time with parent_id and
           insert_index. Use replace_id to replace only one incorrect region.
           When using pencil_render JSX, use OpenPencil layout props:
           flex="col" or flex="row" for auto-layout direction, gap for spacing,
           p/px/py/pt/pr/pb/pl for padding, w/h for size, bg for fill, rounded
           for radius, and stroke/strokeWidth for borders. Do not use flow for
           auto-layout direction; flow is reserved for reading direction.
           If pencil_render returns success=false with a renderDraftId, do not
           resend the complete JSX. Call pencil_render_patch with that draft id,
           expected revision, and the smallest uniquely matching oldText/newText
           edit suggested by the diagnostic. Repeat against the returned revision
           until it commits successfully.
        4. Use pencil_save_version only after an intentional save point.
           Mutating core tools update the working copy but do not create a new
           version by themselves.
        5. Use pencil_import_file for .fig/.pen files in the workspace.
           Accept /workspace paths, relative workspace paths, or portable fileRef
           objects returned by other tools.
        6. Use pencil_export_file for .fig, png, jpg, webp, svg, pdf, or jsx
           exports. Return the workspace reference, path, mime type, size, and
           sha256 to the user.
        7. If a graph edit, import, or export cannot be completed, call
           pencil_report_failure with the operation, errorMessage,
           recoverable flag, and compact evidence.

        Auxiliary tools:
        - Use sandbox_shell only for file inspection, conversion, and workspace
          checks. Do not use it as the persistence path for Pencil documents.
        - Use read_skill_file when an enabled skill applies to the user's design,
          visual, research, or file-processing task.
        - Use web_search/web_fetch when the user asks for current external facts
          or external design references.
      toolsetIds: []
connections: []
