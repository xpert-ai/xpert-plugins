spec_version: 1
id: fx-counter-explosion
name: Counter Explosion
description: A number counts up then bursts — for a big stat.
surfaces: [video]
category: emphasis
tech: [js]

# 五维分类（建库标准）
canvas:  [slides, video]
target:  [number]
intent:  emphasis
runtime: [js]
export:  [skill, html]

dependencies: []
tags: [counter, number, stat, emphasis]

intent_keywords:
  - counter
  - number
  - 数字爆炸
best_for:
  - Title cards, section breaks, or hero moments in slides / launch videos
avoid_when:
  - Web body content or anything that needs focused reading
  - More than one bold effect on screen at once
restraint:
  max_per_view: 1
  notes: A bold, attention-grabbing effect — slides / video first. On web pages use sparingly, one per screen.

motion:
  duration_ms: 0
  easing: ease-out
  reduced_motion: none
  gpu_safe: true

entry: preview.html
implementations:
  - tech: js
    files: [counter-explosion.js, _util.js]
    usage: |
      Add data-fx="counter-explosion" to a positioned container, then call HPX['counter-explosion'](el).
      Canvas-based; from Open Design's html-ppt fx pack. Guard prefers-reduced-motion.

license:
  spdx: Apache-2.0
  upstream: "https://github.com/nexu-io/open-design"
  attribution_required: true
author:
  name: nexu.io
  url: "https://github.com/nexu-io"
version: 0.1.0
