spec_version: 1
id: fx-particle-burst
name: Particle Burst
description: A bright particle burst from the center — a celebratory accent.
surfaces: [video]
category: feedback-delight
tech: [js]

# 五维分类（建库标准）
canvas:  [slides, video]
target:  [section]
intent:  feedback-delight
runtime: [js]
export:  [skill, html]

dependencies: []
tags: [particles, burst, celebration, delight]

intent_keywords:
  - particles
  - burst
  - 粒子迸发
best_for:
  - Title cards, section breaks, or hero moments in slides / launch videos
avoid_when:
  - Web body content or anything that needs focused reading
  - More than one bold effect on screen at once
restraint:
  max_per_view: 1
  notes: A bold, attention-grabbing effect — slides / video first. On web pages use sparingly, one per screen.

motion:
  duration_ms: 0
  easing: ease-out
  reduced_motion: none
  gpu_safe: true

entry: preview.html
implementations:
  - tech: js
    files: [particle-burst.js, _util.js]
    usage: |
      Add data-fx="particle-burst" to a positioned container, then call HPX['particle-burst'](el).
      Canvas-based; from Open Design's html-ppt fx pack. Guard prefers-reduced-motion.

license:
  spdx: Apache-2.0
  upstream: "https://github.com/nexu-io/open-design"
  attribution_required: true
author:
  name: nexu.io
  url: "https://github.com/nexu-io"
version: 0.1.0
