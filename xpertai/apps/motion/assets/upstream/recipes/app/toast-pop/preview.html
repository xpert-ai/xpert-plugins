<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>toast-pop · motion-anything recipe</title>
  <style>
    :root{ --accent:#8b7cf6; color-scheme:light; }
    html,body{ margin:0; height:100%; }
    body{ display:grid; place-items:center; background:#f4f5f7; font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
.ui-toast{display:flex;align-items:center;gap:9px;background:#1c1b19;color:#fff;padding:13px 20px;border-radius:13px;font:500 15px ui-sans-serif,system-ui;box-shadow:0 12px 30px rgba(0,0,0,.25);opacity:0;transform:translateY(24px);transition:opacity .3s var(--e,cubic-bezier(.16,1,.3,1)),transform .42s cubic-bezier(.34,1.4,.5,1)}
.ui-toast.show{opacity:1;transform:none}
.ui-toast .ck{color:#2ee6a6}
@media(prefers-reduced-motion:reduce){.ui-toast{transition:opacity .2s linear}}
  </style>
</head>
<body>
  <div class="ui-toast"><span class="ck">✓</span> Saved to your library</div>
  <script>var t=document.querySelector('.ui-toast');
function cycle(){t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1700);}
cycle();setInterval(cycle,2600);</script>
</body>
</html>
