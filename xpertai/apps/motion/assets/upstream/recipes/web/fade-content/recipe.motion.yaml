spec_version: 1
id: fade-content
name: Fade Content
description: Content fades and rises gently as it scrolls into view — the calm default reveal.
surfaces: [web, interaction]
canvas: [web]
target: [section,card,text]
intent: scroll-reveal
runtime: [css,js]
export: [skill, motion-json, html]
category: scroll-reveal
tech: [css,js]
dependencies: []
tags: [fade,reveal,on-view,scroll,entrance]
intent_keywords: [fade in on view, reveal on scroll, 进入视口淡入, 滚动淡入]
best_for: ["A few key blocks on a long page"]
avoid_when: ["Above-the-fold hero; every node"]
restraint: { max_per_view: 8, notes: "Use sparingly; tasteful. Plain/static under reduced-motion." }
motion: { duration_ms: 600, easing: ease-out, reduced_motion: graceful, gpu_safe: true }
entry: preview.html
implementations:
  - { tech: css,js, files: [fade-content.css,fade-content.js], usage: "See preview.html; add the class." }
license: { spdx: Apache-2.0, upstream: null, attribution_required: false }
author: { name: nexu.io, url: "https://github.com/nexu-io" }
version: 0.1.0
