<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>loading-shimmer · motion-anything recipe</title>
  <link rel="stylesheet" href="loading-shimmer.css" />
  <style>
    :root { color-scheme: light; }
    body { margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #fff, #f4f5f7); color:#1a1d24; }
    .badge { font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:#8b909a; text-align:center; margin-bottom:14px; }
    .card { width:340px; background:#fff; border:1px solid #ececf1; border-radius:16px; padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.05); }
    .row { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .avatar { width:48px; height:48px; border-radius:50%; }
    .lines { flex:1; }
    .line { height:12px; margin-bottom:8px; }
    .line:last-child { margin-bottom:0; }
    .w70 { width:70%; } .w40 { width:40%; } .w100 { width:100%; } .w90 { width:90%; }
    .block { height:120px; border-radius:12px; margin-bottom:14px; }
  </style>
</head>
<body>
  <div>
    <div class="badge">motion-anything · loading</div>
    <div class="card">
      <div class="row">
        <div class="avatar" data-skeleton></div>
        <div class="lines">
          <div class="line w70" data-skeleton></div>
          <div class="line w40" data-skeleton></div>
        </div>
      </div>
      <div class="block" data-skeleton></div>
      <div class="line w100" data-skeleton></div>
      <div class="line w90" data-skeleton></div>
    </div>
  </div>
</body>
</html>
