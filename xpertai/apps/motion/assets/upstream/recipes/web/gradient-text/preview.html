<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gradient-text · motion-anything recipe</title>
  <link rel="stylesheet" href="gradient-text.css" />
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; gap: 18px; text-align: center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #1b1c24, #0b0b12); color: #e7e8ee; }
    .badge { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: #8b7cf6; }
    h1 { font-size: 56px; margin: 0; font-weight: 800; letter-spacing: -0.02em; }
    .hint { font-size: 13px; color: #7c7f8c; max-width: 340px; }
  </style>
</head>
<body>
  <div class="badge">motion-anything · text-kinetic</div>
  <h1><span class="gradient-text">motion, anything</span></h1>
  <p class="hint">One short headline · slow, on-brand drift · solid color under reduced-motion.</p>
</body>
</html>
