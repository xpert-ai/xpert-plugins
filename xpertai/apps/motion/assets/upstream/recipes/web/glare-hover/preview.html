<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>glare-hover · recipe</title><link rel="stylesheet" href="glare-hover.css"/>
<style>:root{color-scheme:dark}body{margin:0;min-height:100vh;display:grid;place-items:center;gap:22px;text-align:center;font-family:ui-sans-serif,system-ui,sans-serif;background:radial-gradient(120% 120% at 50% 0%,#1b1c24,#0b0b12);color:#e7e8ee}.badge{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#8b7cf6}.glare{width:280px;height:170px;padding:22px;text-align:left;background:linear-gradient(135deg,#2a2551,#14151c);box-shadow:0 18px 40px rgba(0,0,0,.4)}.glare h3{margin:0 0 6px}.glare p{margin:0;font-size:13px;color:#b7b9c6}.hint{font-size:13px;color:#7c7f8c}</style></head>
<body><div class="badge">motion-anything · hover-press</div><div class="glare"><h3>motion, anything</h3><p>Move your cursor across the card — a soft glare follows.</p></div><p class="hint">Glare tracks the pointer · flat on touch &amp; reduced-motion.</p><script src="glare-hover.js"></script></body></html>
