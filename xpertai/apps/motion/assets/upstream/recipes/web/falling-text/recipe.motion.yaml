spec_version: 1
id: falling-text
name: Falling Text
description: Letters drop into place one after another — a light, gravity-flavored headline entrance.
surfaces: [web, interaction]
canvas: [web]
target: [text]
intent: text-kinetic
runtime: [css, js]
export: [skill, motion-json, html]
category: text-kinetic
tech: [css, js]
dependencies: []
tags: [text, fall, drop, gravity, entrance, headline]
intent_keywords: [falling text, letters drop in, 掉落文字, 逐字下落]
best_for: ["A short playful headline entrance"]
avoid_when: ["Body copy; serious tones; more than one per view"]
restraint: { max_per_view: 1, notes: "One short line. Instant under reduced-motion." }
motion: { duration_ms: 700, easing: ease-out, reduced_motion: instant, gpu_safe: true }
entry: preview.html
implementations:
  - { tech: css+js, files: [falling-text.css, falling-text.js], usage: "Add data-falling to a heading; JS splits letters, CSS drops each in with stagger + slight bounce." }
license: { spdx: Apache-2.0, upstream: "https://reactbits.dev/text-animations/falling-text", attribution_required: false }
author: { name: nexu.io, url: "https://github.com/nexu-io" }
version: 0.1.0
