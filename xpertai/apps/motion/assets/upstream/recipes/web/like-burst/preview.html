<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>like-burst · motion-anything recipe</title>
  <link rel="stylesheet" href="like-burst.css" />
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #fff 0%, #f4f5f7 100%);
      color: #1a1d24;
    }
    .stage { text-align: center; }
    .badge {
      display: inline-block; font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
      color: #8b909a; margin-bottom: 18px;
    }
    h1 { font-size: 22px; margin: 0 0 4px; }
    p.sub { margin: 0 0 32px; color: #6b7280; font-size: 14px; }
    .row { display: flex; gap: 28px; justify-content: center; align-items: center; }
    .hint { margin-top: 34px; font-size: 13px; color: #9aa0aa; }
    code { background: #eceef1; padding: 2px 6px; border-radius: 5px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="stage">
    <span class="badge">motion-anything · feedback-delight</span>
    <h1>Like Burst</h1>
    <p class="sub">Tap a heart. Delight fires on the <em>like</em>, never on load.</p>

    <div class="row">
      <button class="like-btn" data-like-burst aria-pressed="false" aria-label="Like">♥</button>
      <button class="like-btn" data-like-burst aria-pressed="false" aria-label="Like">♥</button>
      <button class="like-btn" data-like-burst aria-pressed="false" aria-label="Like">♥</button>
    </div>

    <p class="hint">Respects <code>prefers-reduced-motion</code> — the burst becomes a quiet color cue.</p>
  </div>

  <script src="like-burst.js"></script>
</body>
</html>
