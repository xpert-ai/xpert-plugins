<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>card-lift-hover · motion-anything recipe</title>
  <link rel="stylesheet" href="card-lift-hover.css" />
  <style>
    :root { color-scheme: light; }
    body { margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #fff, #f4f5f7); color:#1a1d24; }
    .wrap { text-align:center; }
    .badge { font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:#8b909a; margin-bottom:22px; }
    .grid { display:flex; gap:20px; }
    .lift-card { width:180px; height:130px; border-radius:16px; background:#fff; border:1px solid #e7e4dd;
      cursor:pointer; display:grid; place-items:center; color:#6b7280; font-size:14px; }
    .hint { margin-top:26px; font-size:13px; color:#9aa0aa; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">motion-anything · hover-press</div>
    <div class="grid">
      <div class="lift-card">Hover me</div>
      <div class="lift-card">Hover me</div>
      <div class="lift-card">Hover me</div>
    </div>
    <p class="hint">Lifts on hover · static under reduced-motion · pure CSS.</p>
  </div>
</body>
</html>
