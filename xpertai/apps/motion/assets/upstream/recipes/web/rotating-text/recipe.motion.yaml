spec_version: 1
id: rotating-text
name: Rotating Text
description: One word swaps for the next in place — a compact way to cycle a few phrases.
surfaces: [web, interaction]
canvas: [web]
target: [text]
intent: text-kinetic
runtime: [css,js]
export: [skill, motion-json, html]
category: text-kinetic
tech: [css,js]
dependencies: []
tags: [rotating,text,cycle,words,headline]
intent_keywords: [rotating words, cycling text, 轮换文字, 词语轮播]
best_for: ["A headline that cycles a few adjectives"]
avoid_when: ["Long text; more than one rotator per view"]
restraint: { max_per_view: 1, notes: "Use sparingly; tasteful. Plain/static under reduced-motion." }
motion: { duration_ms: 500, easing: ease-out, reduced_motion: graceful, gpu_safe: true }
entry: preview.html
implementations:
  - { tech: css,js, files: [rotating-text.css,rotating-text.js], usage: "See preview.html; add the class." }
license: { spdx: Apache-2.0, upstream: null, attribution_required: false }
author: { name: nexu.io, url: "https://github.com/nexu-io" }
version: 0.1.0
