<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>border-beam · motion-anything recipe</title>
  <link rel="stylesheet" href="border-beam.css" />
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; gap: 22px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #1b1c24, #0b0b12); color: #e7e8ee; }
    .badge { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: #8b7cf6; }
    .beam { padding: 28px 32px; max-width: 300px; text-align: center; }
    .beam h3 { margin: 0 0 8px; font-size: 18px; }
    .beam p { margin: 0; font-size: 13px; color: #a2a4b0; line-height: 1.5; }
    .hint { font-size: 13px; color: #7c7f8c; }
  </style>
</head>
<body>
  <div class="badge">motion-anything · ambient</div>
  <div class="beam">
    <h3>✦ New</h3>
    <p>A bright comet travels the border — livelier than a full-border glow.</p>
  </div>
  <p class="hint">One beaming element per view · brighter than shine-border · static under reduced-motion.</p>
</body>
</html>
