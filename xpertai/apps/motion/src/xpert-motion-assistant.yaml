      assistantKind: business-assistant
      businessDomain: motion
      requiredPlugin: '@xpert-ai/plugin-motion'
      requiredPlugins:
        - '@xpert-ai/plugin-motion'
      requiredCapabilities:
        - motion
        - motion-workbench
        - agent-motion
        - motion-library
  agentConfig:
    stateVariables:
      - name: motionProjectId
        type: string
        default: ""
        description: Current Motion project id selected in the workbench
        operation: null
      - name: motionSurface
        type: string
        default: ""
        description: Current Motion surface, web or video
        operation: null
      - name: motionSelectedComponentJson
        type: string
        default: ""
        description: Current selected HTML component or video layer context
        operation: null
      - name: motionSelectedRecipeId
        type: string
        default: ""
        description: Current selected Motion recipe id
        operation: null
      - name: motionDirty
        type: string
