  description: Agentic motion assistant for animated HTML pages, launch videos, recipe routing, review, and exports
  avatar:
    emoji:
      id: high_voltage
    background: rgb(219, 234, 254)
  options:
    templateKey: motion-assistant
    dataXpert:
      managedBy: data-xpert
