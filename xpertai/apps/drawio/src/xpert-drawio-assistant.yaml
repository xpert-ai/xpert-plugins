team:
  name: drawio-assistant
  type: agent
  title: draw.io 绘图助手
  description:
    en_US: Agentic Drawing assistant for flowcharts, architecture diagrams, wireframes, and freeform whiteboards
    zh_Hans: 面向流程图、架构图、线框图和自由白板的 Agentic Drawing 助手
  avatar:
    emoji:
      id: art
    background: rgb(219, 234, 254)
  options:
    templateKey: drawio-assistant
    dataXpert:
      managedBy: data-xpert
      templateKey: drawio-assistant
      assistantKind: business-assistant
      businessDomain: drawio
      requiredPlugin: '@xpert-ai/plugin-drawio'
      requiredPlugins:
        - '@xpert-ai/plugin-drawio'
      requiredCapabilities:
        - drawio
        - drawio-workbench
        - drawio-agent-drawing
  agentConfig:
    stateVariables:
      - name: currentDrawingId
        type: string
        default: ""
        description: Current draw.io diagram id selected in the workbench
        operation: null
      - name: currentVersionId
        type: string
        default: ""
        description: Current draw.io version id selected in the workbench
        operation: null
    recursionLimit: 10000
  features:
    sandbox:
      enabled: true
      provider: docker-sandbox
  version: "1"
  agent:
    key: Agent_Drawio
  copilotModel:
    referencedId: null
    modelType: llm
    model: qwen3.6-plus
    options:
      context_size: 1000000
      temperature: 0.2
      maxRetries: 6
      max_tokens: 8192
      top_p: 0.95
  knowledgebases: []
  toolsets: []
  tags: []
nodes:
  - type: agent
    key: Agent_Drawio
    position:
      x: 860
      y: 20
    entity:
      key: Agent_Drawio
      name: drawio-assistant
      title: draw.io 绘图助手
      description:
        en_US: Agentic Drawing assistant for flowcharts, architecture diagrams, wireframes, and freeform whiteboards
        zh_Hans: 面向流程图、架构图、线框图和自由白板的 Agentic Drawing 助手
      avatar:
        emoji:
          id: art
        background: rgb(219, 234, 254)
      prompt: >
        You are draw.io Drawing Assistant, a data-xpert business assistant for
        creating and managing reviewable draw.io / diagrams.net diagrams.

        Use draw.io middleware tools as the system of record. Do not claim that a
        diagram was saved unless a tool call succeeded. Keep every diagram reviewable,
        editable, and versioned.

        Drawing workflow:
        1. Clarify the drawing goal, audience, key nodes, relationships, and any visual
           constraints when the request is ambiguous.
        2. Prefer Mermaid for flowcharts, architecture flows, state flows, and simple
           dependency diagrams. Save Mermaid with drawio_save_mermaid_draft so the
           workbench can load it into the embedded draw.io editor for user review.
        3. Use direct diagrams.net/draw.io XML when the user needs precise layout,
           annotations, freeform whiteboarding, wireframes, or a targeted edit.
        4. When updating an existing diagram, call drawio_get_diagram first, preserve
           existing user edits, then call drawio_patch_scene for small changes or
           drawio_save_scene_version for a full replacement.
        5. Use clear titles, short change summaries, and tags when useful.
        6. If source material cannot be converted or the request conflicts with the
           current drawing, call drawio_report_failure and explain the smallest
           useful next step.

        Mermaid rules:
        - Flowcharts, architecture flows, state flows, and simple sequences are good
          Mermaid candidates for draw.io import.
        - For Mermaid diagram types that diagrams.net may import as an image or with
          limited structure, warn the user that manual editing may be limited after conversion.
        - Keep Mermaid source concise, syntactically valid, and readable.

        draw.io XML rules:
        - Prefer an <mxfile> wrapper with at least one <diagram> page.
        - Preserve existing XML unless the user asks for a full replacement.
        - Use simple mxCell shapes, text labels, arrows, and grouping by visual proximity.
        - Report uncertainty in the response instead of inventing missing domain facts.

        Prefer concise Chinese responses for end users unless they ask otherwise.
      collaboratorNames: []
      toolsetIds: []
      knowledgebaseIds: []
    hash: drawio-agent-v1
  - type: workflow
    key: Middleware_Drawio
    position:
      x: 1160
      y: 332
    entity:
      type: middleware
      key: Middleware_Drawio
      title: draw.io Agent Tools
      provider: DrawioMiddleware
      required: true
    hash: drawio-middleware-v1
connections:
  - type: workflow
    key: Agent_Drawio/Middleware_Drawio
    from: Agent_Drawio
    to: Middleware_Drawio
