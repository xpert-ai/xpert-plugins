background: '#F6F7F7'
configurate_methods:
- predefined-model
description:
  en_US: Models provided by Tencent Hunyuan, such as hunyuan-standard, hunyuan-standard-256k,
    hunyuan-pro and hunyuan-lite.
  zh_Hans: 腾讯混元提供的模型，例如 hunyuan-standard、 hunyuan-standard-256k, hunyuan-pro 和 hunyuan-lite。
extra:
  python:
    model_sources:
    - models/llm/llm.py
    - models/text_embedding/text_embedding.py
    provider_source: provider/hunyuan.py
help:
  title:
    en_US: Get your API Key from Tencent Hunyuan
    zh_Hans: 从腾讯混元获取 API Key
  url:
    en_US: https://api.hunyuan.cloud.tencent.com/
icon_large:
  en_US: icon_l_en.png
icon_small:
  en_US: icon_s_en.png
label:
  en_US: Hunyuan
  zh_Hans: 腾讯混元
models:
  llm:
    position: models/llm/_position.yaml
    predefined:
    - models/llm/*.yaml
provider: hunyuan
provider_credential_schema:
  credential_form_schemas:
  - label:
      en_US: API Key
    placeholder:
      en_US: Enter your API Key
      zh_Hans: 在此输入您的 API Key
    required: true
    type: secret-input
    variable: api_key
  - label:
      en_US: API endpoint URL
      zh_Hans: API endpoint URL
    placeholder:
      en_US: Base URL, e.g. https://api.hunyuan.cloud.tencent.com/v1
      zh_Hans: Base URL，例如 https://api.hunyuan.cloud.tencent.com/v1
    required: false
    type: text-input
    variable: endpoint_url
  - label:
      en_US: API endpoint model name
      zh_Hans: API endpoint 中的模型名称
    placeholder:
      en_US: Optional, override model name sent to endpoint
      zh_Hans: 可选，用于覆盖发送给 endpoint 的模型名称
    required: false
    type: text-input
    variable: endpoint_model_name
supported_model_types:
- llm
