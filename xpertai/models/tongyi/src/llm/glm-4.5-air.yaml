# for more details, please refer to https://help.aliyun.com/zh/model-studio/glm
model: glm-4.5-air
label:
  en_US: glm-4.5-air
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 131072
parameter_rules:
  - name: temperature
    use_template: temperature
    type: float
    default: 0.6
    min: 0.0
    max: 2.0
    help:
      zh_Hans: 用于控制随机性和多样性的程度。
      en_US: Used to control the degree of randomness and diversity.
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 8192
    min: 1
    max: 16384
    help:
      zh_Hans: 用于指定模型在生成内容时token的最大数量，它定义了生成的上限，但不保证每次都会生成到这个数量。
      en_US: It is used to specify the maximum number of tokens when the model generates content. It defines the upper limit of generation, but does not guarantee that this number will be generated every time.
  - name: top_p
    use_template: top_p
    type: float
    default: 0.95
    min: 0.1
    max: 0.9
  - name: top_k
    type: int
    default: 20
    min: 0
    max: 99
    label:
      zh_Hans: 取样数量
      en_US: Top k
  - name: repetition_penalty
    required: false
    type: float
    default: 1.0
    label:
      zh_Hans: 重复惩罚
      en_US: Repetition penalty
    help:
      zh_Hans: 用于控制模型生成时的重复度。提高repetition_penalty时可以降低模型生成的重复度。1.0表示不做惩罚。
      en_US: Used to control the repeatability when generating models. Increasing repetition_penalty can reduce the duplication of model generation. 1.0 means no punishment.
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_object
