# for more details, please refer to https://help.aliyun.com/zh/model-studio/minimax-api
model: MiniMax-M2.5
label:
  zh_Hans: MiniMax-M2.5
  en_US: MiniMax-M2.5
model_type: llm
features:
  - agent-thought
  - multi-tool-call
model_properties:
  mode: chat
  context_size: 196608
parameter_rules:
  - name: temperature
    use_template: temperature
    type: float
    default: 1.0
    min: 0.0
    max: 2.0
    help:
      zh_Hans: 用于控制随机性和多样性的程度。具体来说，temperature 值控制了生成文本时对每个候选词的概率分布进行平滑的程度。较高的 temperature 值会降低概率分布的峰值，使得更多的低概率词被选择，生成结果更加多样化；而较低的 temperature 值则会增强概率分布的峰值，使得高概率词更容易被选择，生成结果更加确定。
      en_US: Used to control the degree of randomness and diversity. Specifically, the temperature value controls the degree to which the probability distribution of each candidate word is smoothed when generating text. A higher temperature value will reduce the peak value of the probability distribution, allowing more low-probability words to be selected, and the generated results will be more diverse; while a lower temperature value will enhance the peak value of the probability distribution, making it easier for high-probability words to be selected, the generated results are more certain.
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 8192
    min: 1
    max: 32768
    help:
      zh_Hans: 用于指定模型在生成内容时 token 的最大数量（包含思维链和回复），它定义了生成的上限，但不保证每次都会生成到这个数量。
      en_US: It is used to specify the maximum number of tokens when the model generates content (including reasoning chain and reply). It defines the upper limit of generation, but does not guarantee that this number will be generated every time.
  - name: top_p
    use_template: top_p
    type: float
    default: 0.95
    min: 0.0
    max: 1.0
    help:
      zh_Hans: 生成过程中核采样方法概率阈值，例如，取值为 0.8 时，仅保留概率加起来大于等于 0.8 的最可能 token 的最小集合作为候选集。取值范围为（0,1.0)，取值越大，生成的随机性越高；取值越低，生成的确定性越高。
      en_US: The probability threshold of the kernel sampling method during the generation process. For example, when the value is 0.8, only the smallest set of the most likely tokens with a sum of probabilities greater than or equal to 0.8 is retained as the candidate set. The value range is (0,1.0). The larger the value, the higher the randomness generated; the lower the value, the higher the certainty generated.
  - name: presence_penalty
    required: false
    type: float
    default: 0.0
    label:
      zh_Hans: 存在惩罚
      en_US: Presence penalty
    help:
      zh_Hans: 控制生成文本中词汇的多样性。正值会减少重复使用已出现的词汇，使输出更加多样化。
      en_US: Controls the diversity of vocabulary in the generated text. Positive values reduce the reuse of words that have already appeared, making the output more diverse.
  - name: extra_headers
    required: false
    type: string
    label:
      zh_Hans: 额外请求头，Json字符串格式
      en_US: Extra Headers
    help:
      zh_Hans: 以 JSON 字符串格式输入额外的 HTTP 请求头，这些请求头将包含在 API 请求中。
      en_US: Enter extra HTTP headers in JSON string format, which will be included in the API request.
pricing:
  input: '2.1'
  output: '8.4'
  unit: '0.000001'
  currency: RMB
