model: deepseek-r1-distill-qwen-32b
label:
  zh_Hans: DeepSeek-R1-Distill-Qwen-32B
  en_US: DeepSeek-R1-Distill-Qwen-32B
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 32000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    min: 1
    max: 8192
    default: 4096
  - name: extra_headers
    required: false
    type: string
    label:
      zh_Hans: 额外请求头，Json字符串格式
      en_US: Extra Headers
    help:
      zh_Hans: 以 JSON 字符串格式输入额外的 HTTP 请求头，这些请求头将包含在 API 请求中。
      en_US: Enter extra HTTP headers in JSON string format, which will be included in the API request.
pricing:
  input: "0.002"
  output: "0.006"
  unit: "0.001"
  currency: RMB
