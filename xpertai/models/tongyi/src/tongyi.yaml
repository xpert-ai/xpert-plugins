provider: tongyi
label:
  en_US: Tongyi
  zh_Hans: 通义
background: '#EFF1FE'
icon_small:
  en_US: icon_s_en.png
icon_large:
  en_US: icon_l_en.png
  zh_Hans: icon_l_zh.png
help:
  title:
    en_US: Get your API key from AliCloud
    zh_Hans: 从阿里云百炼获取 API Key
  url:
    en_US: https://bailian.console.aliyun.com/?apiKey=1#/api-key
supported_model_types:
  - llm
  - text-embedding
  - rerank
  - speech2text
  - tts
configurate_methods:
  - predefined-model
  - customizable-model
provider_credential_schema:
  credential_form_schemas:
    - variable: dashscope_api_key
      label:
        en_US: API Key
      type: secret-input
      required: true
      placeholder:
        zh_Hans: 在此输入您的 API Key
        en_US: Enter your API Key
    - variable: use_international_endpoint
      label:
        en_US: Use International Endpoint
        zh_Hans: 使用国际端点
      type: radio
      required: true
      default: 'false'
      options:
        - value: 'true'
          label:
            en_US: 'True'
            zh_Hans: '是'
        - value: 'false'
          label:
            en_US: 'False'
            zh_Hans: '否'
model_credential_schema:
  model:
    label:
      en_US: Model Name
      zh_Hans: 模型名称
    placeholder:
      en_US: Enter your model name
      zh_Hans: 输入模型名称
  credential_form_schemas:
    - variable: dashscope_api_key
      label:
        en_US: API Key
      type: secret-input
      required: true
      placeholder:
        zh_Hans: 在此输入您的 API Key
        en_US: Enter your API Key
    - variable: context_size
      label:
        en_US: Model context size
        zh_Hans: 模型上下文长度
      type: text-input
      required: true
      default: '4096'
    - variable: max_tokens
      label:
        en_US: Upper bound for max tokens
        zh_Hans: 最大 token 上限
      type: text-input
      default: '4096'
      show_on:
        - variable: __model_type
          value: llm
    - variable: function_calling_type
      label:
        en_US: Function calling
        zh_Hans: 函数调用
      type: select
      required: false
      default: no_call
      show_on:
        - variable: __model_type
          value: llm
      options:
        - value: no_call
          label:
            en_US: Not Support
            zh_Hans: 不支持
        - value: function_call
          label:
            en_US: Support
            zh_Hans: 支持
models:
  llm:
    position: models/llm/_position.yaml
    predefined:
      - models/llm/*.yaml
  text-embedding:
    predefined:
      - models/text-embedding/*.yaml
  rerank:
    position: models/rerank/_position.yaml
    predefined:
      - models/rerank/*.yaml
  speech2text:
    predefined:
      - models/speech2text/*.yaml
  tts:
    predefined:
      - models/tts/*.yaml
