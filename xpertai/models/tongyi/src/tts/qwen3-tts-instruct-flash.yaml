# for more details, please refer to https://help.aliyun.com/zh/model-studio/qwen-tts
model: qwen3-tts-instruct-flash
model_type: tts
model_properties:
  default_voice: 'Ethan'
  voices:
    - mode: "Ethan"
      language: [ "zh-Hans", "en-US" ]
    - mode: "Cherry"
      language: [ "zh-Hans", "en-US" ]
    - mode: "Serena"
      language: [ "zh-Hans", "en-US" ]
    - mode: "Chelsie"
      language: [ "zh-Hans", "en-US" ]
    - mode: "Dylan"
      language: [ "zh-Hans", "en-US" ]
    - mode: "Jada"
      language: [ "zh-Hans", "en-US" ]
    - mode: "Sunny"
      language: [ "zh-Hans", "en-US" ]
  word_limit: 7000
  audio_type: 'wav'
  max_workers: 5
