model: gpt-5.2-chat
label:
  en_US: GPT-5.2 Chat
  zh_Hans: GPT-5.2 Chat
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
  - structured-output
  - vision
model_properties:
  mode: chat
  context_size: 128000
  max_output: 16384
parameter_rules:
  - name: temperature
    use_template: temperature
    default: 1
    min: 0.0
    max: 2.0
    help:
      zh_Hans: 采样温度，控制输出的随机性。
      en_US: Sampling temperature, controls the randomness of the output.
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 16384
    help:
      zh_Hans: 最大输出 token 数量。
      en_US: Maximum number of output tokens.
  - name: top_p
    use_template: top_p
    default: 1
    min: 0.0
    max: 1.0
    help:
      zh_Hans: 核采样参数，控制输出的多样性。
      en_US: Nucleus sampling parameter, controls output diversity.
  - name: frequency_penalty
    use_template: frequency_penalty
    default: 0
    min: -2.0
    max: 2.0
    help:
      zh_Hans: 降低重复内容的出现频率。
      en_US: Reduces repetition in the output.
  - name: presence_penalty
    label:
      zh_Hans: 存在惩罚
      en_US: Presence Penalty
    type: float
    default: 0
    min: -2.0
    max: 2.0
    help:
      zh_Hans: 提高讨论新话题的可能性。
      en_US: Increases the likelihood of discussing new topics.
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式。
      en_US: Specifying the format that the model must output.
    required: false
    options:
      - text
      - json_object
pricing:
  input: '1.75'
  output: '14'
  unit: '0.000001'
  currency: USD
