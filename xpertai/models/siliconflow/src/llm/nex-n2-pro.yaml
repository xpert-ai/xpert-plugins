model: nex-agi/Nex-N2-Pro
label:
  en_US: nex-agi/Nex-N2-Pro
  zh_Hans: nex-agi/Nex-N2-Pro
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
  - vision
model_properties:
  mode: chat
  context_size: 262144
parameter_rules:
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
pricing:
  input: "1.75"
  output: "7"
  unit: "0.000001"
  currency: RMB
