model: meituan-longcat/LongCat-2.0
label:
  en_US: meituan-longcat/LongCat-2.0
  zh_Hans: meituan-longcat/LongCat-2.0
model_type: llm
features:
  - agent-thought
  - tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_object
  - name: enable_thinking
    required: false
    type: boolean
    default: true
    label:
      zh_Hans: 思考模式
      en_US: Thinking mode
    help:
      zh_Hans: 是否开启思考模式。
      en_US: Whether to enable thinking mode.
pricing:
  input: "5"
  output: "20"
  unit: "0.000001"
  currency: RMB
