model: glm-4.7-flashx
label:
  en_US: glm-4.7-flashx
  zh_Hans: glm-4.7-flashx
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 204800
parameter_rules:
  - name: thinking
    label:
      zh_Hans: 推理模式
      en_US: Thinking Mode
    type: string
    default: disabled
    required: false
    options:
      - enabled
      - disabled
    help:
      zh_Hans: 控制模型的推理能力。
      en_US: Controls the model's thinking capability.
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_object
pricing:
  input: "0.0005"
  output: "0.003"
  unit: "0.001"
  currency: RMB
